<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Regma IT — Logo Sheet</title>
  <desc>All logo variants for Regma IT: primary dark, on light, on teal, and size scale</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
    .lbl { font-family: sans-serif; font-size: 11px; fill: #888780; text-anchor: middle; }
    .meta { font-family: sans-serif; font-size: 12px; fill: #555; }
  </style>

  <rect width="680" height="380" fill="#f4f4f2" rx="0"/>

  <!-- Primary dark -->
  <rect x="40" y="30" width="260" height="90" rx="10" fill="#1a1a2e"/>
  <text x="170" y="82" font-family="'JetBrains Mono', monospace" font-size="26" font-weight="400" fill="#e0e0e0" text-anchor="middle" letter-spacing="1">REGMA<tspan fill="#1D9E75" font-weight="600" letter-spacing="3"> IT</tspan></text>
  <rect x="70" y="90" width="200" height="1" fill="#1D9E75" opacity="0.5"/>
  <text x="170" y="136" class="lbl">Primary (dark)</text>

  <!-- On light -->
  <rect x="380" y="30" width="260" height="90" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="510" y="82" font-family="'JetBrains Mono', monospace" font-size="26" font-weight="400" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">REGMA<tspan fill="#1D9E75" font-weight="600" letter-spacing="3"> IT</tspan></text>
  <rect x="410" y="90" width="200" height="1" fill="#1D9E75" opacity="0.5"/>
  <text x="510" y="136" class="lbl">On light</text>

  <!-- On teal -->
  <rect x="210" y="165" width="260" height="90" rx="10" fill="#1D9E75"/>
  <text x="340" y="217" font-family="'JetBrains Mono', monospace" font-size="26" font-weight="400" fill="white" text-anchor="middle" letter-spacing="1">REGMA<tspan font-weight="600" letter-spacing="3"> IT</tspan></text>
  <rect x="240" y="225" width="200" height="1" fill="white" opacity="0.5"/>
  <text x="340" y="270" class="lbl">On teal</text>

  <!-- Size scale -->
  <text x="40" y="310" class="lbl" text-anchor="start" font-size="10" fill="#aaa">SIZE SCALE</text>
  <rect x="40" y="318" width="180" height="40" rx="8" fill="#1a1a2e"/>
  <text x="130" y="343" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="400" fill="#e0e0e0" text-anchor="middle" letter-spacing="1">REGMA<tspan fill="#1D9E75" font-weight="600" letter-spacing="2"> IT</tspan></text>

  <rect x="234" y="322" width="120" height="32" rx="6" fill="#1a1a2e"/>
  <text x="294" y="343" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="400" fill="#e0e0e0" text-anchor="middle" letter-spacing="0.5">REGMA<tspan fill="#1D9E75" font-weight="600" letter-spacing="2"> IT</tspan></text>

  <rect x="368" y="326" width="80" height="24" rx="5" fill="#1a1a2e"/>
  <text x="408" y="343" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="400" fill="#e0e0e0" text-anchor="middle" letter-spacing="0.5">REGMA<tspan fill="#1D9E75" font-weight="600"> IT</tspan></text>

  <!-- Color swatches -->
  <rect x="460" y="310" width="20" height="20" rx="4" fill="#1a1a2e"/>
  <text x="486" y="324" class="meta" font-size="10" fill="#555">#1a1a2e</text>
  <rect x="460" y="336" width="20" height="20" rx="4" fill="#1D9E75"/>
  <text x="486" y="350" class="meta" font-size="10" fill="#555">#1D9E75</text>
  <rect x="560" y="310" width="20" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
  <text x="586" y="324" class="meta" font-size="10" fill="#555">#e0e0e0</text>
</svg>
